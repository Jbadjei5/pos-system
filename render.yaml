services:
  # Backend API Service
  - type: web
    name: pos-backend
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server-postgres.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # JWT Secret - generate a secure random string
      - key: JWT_SECRET
        value: # Set this in Render dashboard
      # Frontend URL for CORS
      - key: FRONTEND_URL
        value: # Set this to your Vercel URL
      # Paystack keys
      - key: PAYSTACK_PUBLIC_KEY
        value: pk_live_ac50bb69405548b385982fc3639348a1570e0dc5
      - key: PAYSTACK_SECRET_KEY
        value: # Set this in Render dashboard

databases:
  # PostgreSQL Database for production
  - name: pos-database
    databaseName: pos_system
    user: pos_user
    plan: free
