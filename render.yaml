services:
  # Backend API Service
  - type: web
    name: pos-backend
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Database configuration - you'll need to set these in Render dashboard
      - key: DB_HOST
        value: # Set this in Render dashboard
      - key: DB_USER
        value: # Set this in Render dashboard  
      - key: DB_PASSWORD
        value: # Set this in Render dashboard
      - key: DB_NAME
        value: # Set this in Render dashboard
      # JWT Secret - generate a secure random string
      - key: JWT_SECRET
        value: # Set this in Render dashboard
      # Paystack keys
      - key: PAYSTACK_PUBLIC_KEY
        value: pk_live_ac50bb69405548b385982fc3639348a1570e0dc5
      - key: PAYSTACK_SECRET_KEY
        value: # Set this in Render dashboard

databases:
  # MySQL Database for production
  - name: pos-database
    databaseName: pos_system
    user: pos_user
    plan: free
